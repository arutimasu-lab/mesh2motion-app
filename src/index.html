<body style="margin: 0">
    <!-- Script files-->
    <script type="module" src="./marketing/MarketingBootstrap.ts"></script>

    <!-- Stylesheets-->
    <link href="./styles.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="./radio-button-group.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./animation-player.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./dialog.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./settings-dropdown.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./marketing/marketing.css" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <nav>
        <div style="display: inline-flex; align-items: center;">
            <a href="https://momind.vercel.app">MotionMind</a>
            <span class="active-nav-item">Explore</span>
            <a href="/create.html">Use Your Model</a>
            <a href="/retarget/index.html">Use Your Rigged Model</a>
             
           
        </div>

        <div style="display: inline-flex; align-items: center;">
            <!--<a href="#" id="learn-link">Learn</a>
            <a href="#" id="attribution-link">Contributors</a>-->
            

            <!-- Settings Toggle Dropdown -->
            
        </div>
    </nav>

    <!-- Top toolbar with mouse controls -->
    <div id="header-ui">



        <div>
            <img src="/images/mouse-left.svg" class="nav-icon" style="vertical-align: middle;"/> Rotate
        </div>

        <div>
            <img src="/images/mouse-right.svg" class="nav-icon" style="vertical-align: middle;"/> Pan
        </div>
        <div>
            <img src="/images/mouse-middle.svg" class="nav-icon" style="vertical-align: middle;"/> Zoom
        </div>
    </div>

    <div class="model-selection-section">
        <!-- populated dynamically from RigConfig -->
    </div>


    <div id="tool-panel">
        <!-- create a radio button group. There are two options. Move Skeleton, Rotate Mesh -->
        <div id="tool-selection-group">
           
                <!-- <div style="margin-bottom: 1rem; padding: 0;">

                    <span id="current-step-label"></span>
                </div> -->

                <div id="load-skeleton-tools">

                    <span>
                        <span style="max-width: 220px">Rotate Model to face front <br/> (blue origin line)</span>
                        <div style="display: flex; flex-direction: row">
                            <button class="secondary-button" id="rotate-model-x-button">X</button>
                            <button class="secondary-button" id="rotate-model-y-button">Y</button>
                            <button class="secondary-button" id="rotate-model-z-button">Z</button>
                        </div>
                    </span>


                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <span>Skeleton template:</span>
                            <select id="skeleton-selection">
                                <!-- populated dynamically from RigConfig -->
                            </select>
                        </div>

                </div>


            <span id="skeleton-step-actions">

                <!-- back to load skeleton -->
                 <div class="display: flex; gap: 0.5rem;">
                     <button class="no-style-button" id="action_back_to_load_skeleton" >&#x2039; Back</button>
                     <button id="action_bind_pose" >Bind pose</button>
                 </div>

            </span>

            <!-- model variation switcher-->
            <!--<div id="model-variation-switcher">
                <div id="model-variation-info">
                    <img id="model-variation-info-image" src="" alt="" />
                    <div id="model-variation-info-details">
                        <span style="display: flex; flex-direction: row; gap: 0.5rem;">
                            <span id="model-variation-info-name"></span>
                            
                        </span>
                        <span>
                            <span id="model-variation-info-attribution"></span> 
                            <span id="model-variation-info-license" class="variation-license-chip"></span> 
                        </span>
                                             
                    </div>
                </div>
                <button id="model-variation-button" class="secondary-button">Change</button>
            </div>-->

    

            <span id="skinned-step-animation-export-options">

                <div id="animations-listing">
    
                    <!-- Filter textbox for animations -->     
                    <div id="animation-listing-count">0</div>
                    <input type="text" id="animation-filter" placeholder="Filter animations...">

                    <!-- loading progress when animations start getting larger. -->
                    <div id="animation-progress-loader-container" style="display: none">
                        <div id="loading-status-text">Loading animation data</div>
                        <div id="loading-progress-bar"></div>
                        <div id="current-file-progress-bar"></div>
                    </div>
       
        
                    <!-- javascript will populate this item with animations
                         that we get from the animations file(s)  -->
                    <div id="animations-items"> </div> 

       
       

                    <div style="display: flex; gap: 0.5rem;">
                        
                        <!-- testing the mirroring options -->
                        
                        <!--<div class="styled-checkbox icon-toggle">
                            <input type="checkbox" id="mirror-animations-checkbox" name="mirror-animations" value="true" style="display:none;">
                            <label for="mirror-animations-checkbox" data-tippy-content="Mirror animations"  tabindex="0">
                                <img class="action-icon" src="images/icons/mirror.svg" alt="Mirror animations" />
                            </label>
                        </div>-->


                        <!--<button class="secondary-button" id="import-animations-button" data-tippy-content="Import GLB animations. Only Mesh2Motion rigs are supported at this time." aria-label="Import GLB animations. Only Mesh2Motion rigs are supported at this time.">

                        <button class="secondary-button" id="import-animations-button" data-tippy-content="Import GLB animations. Only MotionMind rigs are supported at this time." aria-label="Import GLB animations. Only MotionMind rigs are supported at this time.">

                            <span class="material-symbols-outlined">upload</span>
                        </button>-->


                        <input id="import-animations-input" type="file" accept=".glb" multiple style="display:none" />

                        <button id="export-button" data-tippy-content="Exporting will combine all animations into a single GLB file.">
                            <span class="button-icon-group">
                                <span class="material-symbols-outlined">save_alt</span>
                                <span>Download <span id="animation-selection-count">0</span></span>
                            </span>
                        </button>
                        <a id="download-hidden-link" href="#" style="display:none"></a>
                    </div>


       
                </div>
        
               
            </span>


        </div>

    </div> <!-- end tool-panel-->

    <!-- Free-floating Animation Player -->
    <div id="animation-player">
        <div id="current-animation-container">
            <span id="current-animation-name">No animation selected</span>
        </div>
        <div id="play-controls">
            <button id="play-pause-button" class="animation-control-button" disabled>
                <span class="material-symbols-outlined">play_arrow</span>
            </button>
            <span>
                <span id="current-time">0f</span> / 
                <span id="total-time">0f</span>
            </span>
            <input type="range" id="animation-scrubber" min="0" max="100" value="0" step="any" disabled>


            <!-- checkbox option to show skeleton -->
            <div id="skeleton-toggle" class="styled-checkbox icon-toggle" >
                <input type="checkbox" id="show-skeleton-checkbox" name="show-skeleton" value="show" style="display:none;">
                <label for="show-skeleton-checkbox" data-tippy-content="Show skeleton"  tabindex="0" style="border-radius: 0">
                    <img src="../images/icons/bone-display.svg" class="action-icon" alt="Show skeleton" style="user-select: none;" />
                </label>
            </div>
        </div>



    </div>

    


    <!-- 3d view control hit box. It is just a container to help with 3d view controls. -->
    <div id="view-control-hitbox"></div>


    <!-- build version information-->
    <span id="build-version"></span>

            <!-- model variation confirmation dialog (hidden by default) -->
            <div id="variation-dialog-overlay" class="modal-dialog-overlay" style="display: none">
                <div class="modal-dialog-content variation-dialog">
                    <h2>Choose Model</h2>
                    <div id="variation-grid" class="variation-grid">
                        <!-- cards populated dynamically from RigConfig -->
                    </div>
                    <div id="variation-loading-container" class="variation-loading-container" style="display: none">
                        <div class="variation-loading-track">
                            <span id="variation-loading-text" class="variation-loading-text">Loading model…</span>
                            <div id="variation-loading-bar" class="variation-loading-bar"></div>
                        </div>
                        
                    </div>
                    <div class="variation-dialog-buttons">
                        <button id="variation-cancel-button" class="secondary-button">Cancel</button>
                        <button id="variation-confirm-button" disabled>Replace Model</button>
                    </div>
                </div>
            </div>

</body>
</html>
